events {
    worker_connections 1024;
}

http {
    # Monolitik backend servisimiz
    upstream backend_api {
        server vip-backend:8080; 
    }

    server {
        listen 80;

        # Genel Proxy Ayarları
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # ---------------------------------------------------------
        # MİKROSERVİS SİMÜLASYONU (API GATEWAY ROUTING)
        # Bütün servisler şu an monolith'e (backend_api) gidiyor.
        # 'v1' kısımları controller'lardan da kaldırılacağı için Nginx'ten de kaldırıldı.
        # ---------------------------------------------------------

        # 1. Auth Service
        location /api/auth/ {
            proxy_pass http://backend_api;
        }

        # 2. User Service
        location /api/users/ {
            proxy_pass http://backend_api;
        }

        # 3. Reservation Service
        location /api/reservations/ {
            proxy_pass http://backend_api;
        }

        # 4. Pricing & Vehicle Service
        location /api/vehicles/ {
            proxy_pass http://backend_api;
        }

        # 5. Diğer Servisler (Notification, Loyalty, Translations)
        location /api/notifications/ {
            proxy_pass http://backend_api;
        }
        location /api/loyalty/ {
            proxy_pass http://backend_api;
        }
        location /api/translations/ {
            proxy_pass http://backend_api;
        }

        # Geri kalan tüm API isteklerini yakala (Fallback)
        location /api/ {
            proxy_pass http://backend_api;
        }

        # ---------------------------------------------------------
        # FRONTEND YÖNLENDİRMESİ
        # Eğer frontend eklenecekse burası kullanılacak
        # ---------------------------------------------------------
        # location / {
        #     proxy_pass http://frontend_app;
        # }
    }
}