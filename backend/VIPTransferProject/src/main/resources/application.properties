spring.application.name=transferProject

# ── Veritabanı ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/vip_transfer_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ── SQL Başlatma ─────────────────────────────────────────────────────────────
# Hibernate DDL'den ÖNCE çalışır: postgis extension ve enum tiplerini oluşturur.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create-types.sql
spring.sql.init.separator=;;

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Sunucu ───────────────────────────────────────────────────────────────────
server.port=8080
