spring.application.name=transferProject

# -- Veritabanı Ayarları
spring.datasource.url=jdbc:postgresql://localhost:5432/vip_transfer_db
spring.datasource.username=postgres
# BURAYA: PostgreSQL kurarken belirlediğin şifreyi yaz!

spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# -- SQL Başlatma
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create-types.sql
spring.sql.init.separator=;;

# -- JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -- Sunucu Portu
server.port=8080