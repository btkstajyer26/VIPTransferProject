spring.application.name=transferProject

# ── Veritabanı ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/vip_transfer_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ── SQL Başlatma ─────────────────────────────────────────────────────────────
# Hibernate DDL'den ÖNCE çalışır: postgis extension ve enum tiplerini oluşturur.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create-types.sql
spring.sql.init.separator=;;

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Sunucu ───────────────────────────────────────────────────────────────────
server.port=8080

# ── E-posta / Gmail SMTP ─────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_APP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Bağlantı sonsuza kadar beklemesin
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Uygulamada kullanılacak gönderen adresi
notification.mail.from=${MAIL_USERNAME}