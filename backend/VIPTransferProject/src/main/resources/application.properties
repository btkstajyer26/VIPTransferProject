# ── Genel Uygulama Ayarları ──────────────────────────────────────────────────
spring.application.name=transferProject
spring.main.allow-bean-definition-overriding=true
server.port=8080

# ── Veritabanı Ayarları ──────────────────────────────────────────────────────
# NOT: Hangi veritabanını kullanıyorsan onu aktif bırak, diğerini silebilirsin.
spring.datasource.url=jdbc:postgresql://localhost:5432/btk
spring.datasource.password=vip_password

# Diğer veritabanı seçeneği (Kullanacaksan üsttekileri silip bunların başındaki # işaretini kaldır):
# spring.datasource.url=jdbc:postgresql://localhost:5432/btk
# spring.datasource.password=vip_passwordS

spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── SQL Başlatma ─────────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create-types.sql
spring.sql.init.separator=;;

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
# Terminalde SQL sorgularını görmek istiyorsan true, gizlemek istiyorsan false yap:
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Mail (Stub — JavaMailSender bean oluşması için) ──────────────────────────
spring.mail.host=localhost
spring.mail.port=1025

# ── Actuator & İzleme (Monitoring) ───────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=transferProject