# ── Genel Uygulama Ayarları ──────────────────────────────────────────────────
spring.application.name=transferProject
spring.main.allow-bean-definition-overriding=true
server.port=8080

# ── Veritabanı Ayarları ──────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── SQL Başlatma ─────────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create-types.sql
spring.sql.init.separator=;;

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create
# Terminalde SQL sorgularını görmek istiyorsan true, gizlemek istiyorsan false yap:
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Mail (Stub — JavaMailSender bean oluşması için) ──────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}

# ── Actuator & İzleme (Monitoring) ───────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=transferProject