# ── .env Dosyası Yükleme ─────────────────────────────────────────────────────
spring.config.import=optional:file:.env[.properties]

# ── Genel Uygulama Ayarları ──────────────────────────────────────────────────
spring.application.name=transferProject
spring.main.allow-bean-definition-overriding=true
server.port=8080

# ── Veritabanı Ayarları ──────────────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


# ── SQL Başlatma ─────────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create-types.sql
spring.sql.init.separator=;;

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
# Terminalde SQL sorgularını görmek istiyorsan true, gizlemek istiyorsan false yap:
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Mail (Gmail SMTP — MAIL_KURULUM.md'ye bak) ───────────────────────────────
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── Uygulama URL (mail linkleri için — aynı WiFi'de erişim için IP'ye çek) ───
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ── Actuator & İzleme (Monitoring) ───────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=transferProject