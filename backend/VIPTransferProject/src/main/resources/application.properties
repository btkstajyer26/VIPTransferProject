spring.application.name=transferProject

# в”Җв”Җ VeritabanДұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
spring.datasource.url=jdbc:postgresql://localhost:5432/vip_transfer_db
spring.datasource.username=postgres
spring.datasource.password=vip_password
spring.datasource.driver-class-name=org.postgresql.Driver

# в”Җв”Җ SQL BaЕҹlatma в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Hibernate DDL'den Г–NCE Г§alДұЕҹДұr: postgis extension ve enum tiplerini oluЕҹturur.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create-types.sql
spring.sql.init.separator=;;

# в”Җв”Җ JPA / Hibernate в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# в”Җв”Җ Sunucu в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
server.port=8080


# Hangi uз noktalar?n d??ar? aз?laca??n? belirler (health, info ve prometheus ?art)
management.endpoints.web.exposure.include=health,info,prometheus
# Grafana'da uygulaman?n ad?n?n do?ru gцrьnmesi iзin etiket ekler
management.metrics.tags.application=${spring.application.name}
# Health kontrolьnьn detaylar?n? aзar (Veritaban? ba?l? m?, disk dolu mu vb. detaylar iзin)
management.endpoint.health.show-details=always