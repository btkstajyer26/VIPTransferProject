
services:
  # ==========================================================
  # 1. VERİTABANI SERVİSİ (Sadece iç ağda erişilebilir - İZOLE)
  # ==========================================================
  postgres-db:
    image: postgis/postgis:15-3.3
    container_name: vip-postgres
    ports:
      - "5432:5432" # IntelliJ'den (localhost üzerinden) bağlanabilmen için şart
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vip_password
      POSTGRES_DB: vip_transfer_db # application.properties ile birebir aynı
    volumes:
      - ./sql-scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vip-network
    restart: unless-stopped

  # ==========================================================
  # 2. BACKEND SERVİSİ (Sadece iç ağda erişilebilir - İZOLE)
  # ==========================================================
  backend-service:
    build:
      context: ./backend/VIPTransferProject
    container_name: vip-backend
    depends_on:
      - postgres-db
    environment:
      # Docker içindeyken localhost çalışmaz, bu yüzden container adını (vip-postgres) veriyoruz
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vip-postgres:5432/vip_transfer_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=vip_password
    networks:
      - vip-network
    restart: on-failure

  # ==========================================================
  # 3. API GATEWAY (DIŞ DÜNYAYA AÇIK TEK KAPI)
  # ==========================================================
  api-gateway:
    image: nginx:latest
    container_name: vip-api-gateway
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-service
    networks:
      - vip-network
    restart: unless-stopped

  # ==========================================================
  # 4. CADVISOR (Docker Konteyner Metrik Toplayıcı)
  # privileged: true hem Mac hem Windows Docker Desktop için gereklidir.
  # ==========================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: vip-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - vip-network
    restart: unless-stopped

  # ==========================================================
  # 4b. NODE EXPORTER (Host CPU/RAM/Disk/Ağ Metrik Toplayıcı)
  # ==========================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: vip-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - vip-network
    restart: unless-stopped

  # ==========================================================
  # 5. PROMETHEUS (Zaman Serili Veritabanı)
  # ==========================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: vip-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - cadvisor
    networks:
      - vip-network	
    restart: unless-stopped

  # ==========================================================
  # 6. GRAFANA (Görsel Panel - Sadece Admin Paneli Olarak Dışa Açık)
  # ==========================================================
  grafana:
    image: grafana/grafana:latest
    container_name: vip-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    depends_on:
      - prometheus
    networks:
      - vip-network
    restart: unless-stopped

# ==========================================================
# CİLT (VOLUME) TANIMLAMALARI (TAMAMEN SOLA YASLI OLMALI)
# ==========================================================
volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

# ==========================================================
# AĞ (NETWORK) TANIMLAMALARI (TAMAMEN SOLA YASLI OLMALI)
# ==========================================================
networks:
  vip-network:
    driver: bridge