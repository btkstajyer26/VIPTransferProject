version: '3.8'

services:
  # ==========================================================
  # 1. VERİTABANI SERVİSİ (Sadece iç ağda erişilebilir - İZOLE)
  # ==========================================================
  postgres-db:
    image: postgis/postgis:15-3.3 # PostGIS uzantısı kurulu Postgres imajı
    container_name: vip-postgres
    environment:
      POSTGRES_USER: postgres       # CREATE EXTENSION yetki sorunu yaşamamak için süper kullanıcı
      POSTGRES_PASSWORD: vip_password
      POSTGRES_DB: btk              # İstediğin veritabanı adı
    volumes:
      # Klasördeki şemayı okuyarak uzantıları ve tabloları otomatik oluşturur
      - ./sql-scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vip-network
    restart: unless-stopped
    # DİKKAT: ports tanımlanmadı! Dışarıdan veritabanına erişmek imkansızdır.

  # ==========================================================
  # 2. BACKEND SERVİSİ (Sadece iç ağda erişilebilir - İZOLE)
  # ==========================================================
  # ==========================================================
  # BACKEND KOPYA 1 (İZOLE)
  # ==========================================================
  backend-service-1:
    build:
      context: ./backend/VIPTransferProject
    container_name: vip-backend-1
    depends_on:
      - postgres-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vip-postgres:5432/btk
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=vip_password
    networks:
      - vip-network
    restart: on-failure

  # ==========================================================
  # BACKEND KOPYA 2 (İZOLE)
  # ==========================================================
  backend-service-2:
    build:
      context: ./backend/VIPTransferProject
    container_name: vip-backend-2
    depends_on:
      - postgres-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vip-postgres:5432/btk
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=vip_password
    networks:
      - vip-network
    restart: on-failure

  # ==========================================================
  # 3. API GATEWAY (DIŞ DÜNYAYA AÇIK TEK KAPI)
  # ==========================================================
  api-gateway:
    image: nginx:latest
    container_name: vip-api-gateway
    ports:
      - "8080:80" # Dış dünyaya açılan tek geçiş kapımız (localhost:8080)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-service-1
      - backend-service-2
    networks:
      - vip-network
    restart: unless-stopped

# ==========================================================
# CİLT VE İZOLE AĞ TANIMLAMALARI
# ==========================================================
volumes:
  postgres_data: # Veritabanının silinmesini önleyen kalıcı disk alanı

networks:
  vip-network:
    driver: bridge # Konteynerlerin kendi aralarında konuşacağı özel köprü ağ